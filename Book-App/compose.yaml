services:
  api-service:
    build: ./Node-API
    container_name: api-1
    ports:
     - 4000:4000
    volumes:
      - /Users/gic-lpt-0183/Batch-1/Docker-Training/Book-App/Node-API:/app
  
  frontend-service:
      build: ./Frontend
      container_name: frontend-container
      ports:
        - 3000:80
      depends_on:
       - api-service
      volumes:
        - /Users/gic-lpt-0183/Batch-1/Docker-Training/Book-App/Frontend:/usr/share/nginx/html

  mysql-db:
    image: mysql:8.0
    container_name: mysql-container
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: bookdb
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: